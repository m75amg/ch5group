services:
  postgres:
    image: postgres:16-alpine
    container_name: ch5-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ch5
      POSTGRES_PASSWORD: ch5dev
      POSTGRES_DB: ch5korea
    ports:
      - "5432:5432"
    volumes:
      - ch5_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ch5 -d ch5korea"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ch5_postgres_data:
