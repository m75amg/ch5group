# /etc/nginx/sites-available/ch5group.conf
# Symlink to /etc/nginx/sites-enabled/ then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Replace /home/ubuntu/ch5group with the actual checkout path on the instance.

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ch5group.com www.ch5group.com;
    return 301 https://ch5group.com$request_uri;
}

# Canonical HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ch5group.com;

    ssl_certificate     /etc/letsencrypt/live/ch5group.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ch5group.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size for media-kit PDF uploads (20MB) etc.
    client_max_body_size 25M;

    # User-uploaded files served straight off disk
    location /uploads/ {
        alias /home/ubuntu/ch5group/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform" always;
        try_files $uri =404;
    }

    # Next.js immutable assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
    }

    # Everything else → Next.js (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/ch5group.access.log;
    error_log  /var/log/nginx/ch5group.error.log;
}

# Optional: redirect www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ch5group.com;

    ssl_certificate     /etc/letsencrypt/live/ch5group.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ch5group.com/privkey.pem;

    return 301 https://ch5group.com$request_uri;
}
